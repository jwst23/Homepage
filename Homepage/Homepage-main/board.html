<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHERIA | NEURAL FEEDBACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="js/firebase-board.js"></script>
</head>
<body style="overflow-y: auto;">
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="noise-overlay"></div>
    
    <header class="header">
        <div class="header-top">
            <div class="header-left">
                <div class="about-link">ABOUT AETHERIA</div>
                <div class="contact-icons">
                    <span>📍</span> <span style="transform: rotate(90deg); display:inline-block;">📞</span> <span>✉️</span> <span>💬</span>
                </div>
            </div>
            <div class="header-center">
                <div class="logo-main"><a href="index.html" style="text-decoration:none; color:inherit;">A E T H E R I A</a></div>
                <div class="logo-sub">AI GRAND HOTEL</div>
                <div class="logo-address">1 Cyber Avenue, Neo-Seoul, +82 2 1234 5678</div>
            </div>
            <div class="header-right">
                <div class="top-links">
                    <span>DESTINATIONS ▼</span>
                    <span>ENGLISH ▼</span>
                </div>
                <div class="reservation-btn">RESERVATION 🗓️</div>
            </div>
        </div>
        <div class="header-bottom">
            <nav class="nav">
                <ul>
                    <li><a href="index.html">THE HOTEL</a></li>
                    <li><a href="accommodation.html">ACCOMMODATION</a></li>
                    <li><a href="experiences.html">AI EXPERIENCES</a></li>
                    <li><a href="gallery.html">IMAGE GALLERY</a></li>
                    <li><a href="board.html" style="color: var(--accent-blue);">GUEST NETWORK</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="board-wrapper">
        <span class="section-tag" style="text-align: center; display: block;">GUEST NETWORK</span>
        <h1 class="board-header" style="font-family: var(--font-heading); font-size: 3rem; margin-bottom: 3rem;">NEURAL FEEDBACK</h1>
        
        <form id="write-form" class="board-form" style="background: white; border: 1px solid #eee; padding: 3rem; border-radius: 12px; margin-bottom: 5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.04);">
            <input type="text" id="post-title" placeholder="SUBJECT / NEURAL ID" required style="color: var(--text-dark); border-bottom: 1px solid #eee; padding: 1rem 0;">
            <input type="text" id="post-author" placeholder="GUEST IDENTIFIER" required style="color: var(--text-dark); border-bottom: 1px solid #eee; padding: 1rem 0;">
            <textarea id="post-content" rows="4" placeholder="TRANSMIT YOUR THOUGHTS..." required style="color: var(--text-dark); border-bottom: 1px solid #eee; padding: 1rem 0;"></textarea>
            <button type="submit" class="booking-submit" style="width: 100%; margin-top: 2rem;">TRANSMIT DATA</button>
        </form>

        <ul id="post-list" class="post-list">
            <!-- Posts will be loaded here dynamically -->
        </ul>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
